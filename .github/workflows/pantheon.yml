name: Pantheon Stack — MetaGPT + AutoGPT

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for MetaGPT to decompose and AutoGPT to execute'
        required: true
        default: 'Analyze OpenAgora performance and suggest optimizations'

jobs:
  metagpt-strategy:
    name: MetaGPT — Strategy Layer
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.plan.outputs.plan }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MetaGPT
        run: |
          pip install metagpt

      - name: Run MetaGPT Strategy
        id: plan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          python3 -c "
          import asyncio
          from metagpt.team import Team
          from metagpt.roles import ProjectManager, Architect, Engineer
          
          async def run():
              team = Team()
              team.hire([ProjectManager(), Architect(), Engineer()])
              await team.run(idea='$TASK', n_round=3)
          
          asyncio.run(run())
          "

  autogpt-execute:
    name: AutoGPT — Executor Layer
    runs-on: ubuntu-latest
    needs: metagpt-strategy
    steps:
      - uses: actions/checkout@v4
        with:
          repository: kevinleestites2-dev/AutoGPT
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Report to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TASK: ${{ github.event.inputs.task }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=⚡ Pantheon Stack Cycle Complete%0ATask: ${TASK}%0AMetaGPT strategy generated%0AAutogpt execution queued%0AStatus: COMPLETE"
